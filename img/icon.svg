    <path d="M120 8H90L8 90V120H120V8Z" fill="#262118"/>
  </g>

  <!-- Border -->
  <rect x="8" y="8" width="112" height="112" rx="24" stroke="#A8B6D4" stroke-width="3.5"/>

  <!-- Left bracket -->
  <path d="M39 44L25 64L39 84"
        stroke="#305EDD"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Right bracket -->
  <path d="M89 44L103 64L89 84"
        stroke="#7CA4ED"
        stroke-width="9"
        stroke-linecap="round"
        stroke-linejoin="round"/>

  <!-- Syntax lines -->
  <rect x="47" y="42" width="34" height="10" rx="5" fill="#D190FF"/>
  <rect x="47" y="59" width="40" height="10" rx="5" fill="#3FA68E"/>
  <rect x="47" y="76" width="28" height="10" rx="5" fill="#B88573"/>
</svg>