<svg xmlns="http://www.w3.org/2000/svg" width="128" height="128" viewBox="0 0 128 128" fill="none">
  <defs>
    <clipPath id="clip">
      <rect x="8" y="8" width="112" height="112" rx="24"/>
    </clipPath>
  </defs>

  <!-- Base tile -->
  <rect x="8" y="8" width="112" height="112" rx="24" fill="#FFFFFF"/>

  <!-- Dark theme area: pushed right so the left bracket has breathing room -->
